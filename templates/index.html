<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Downloader</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 520px;
        }
        h1 {
            margin: 0 0 0.5rem 0;
            font-size: 1.75rem;
            font-weight: 700;
            color: #1a1a2e;
        }
        .subtitle {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }
        .input-group {
            margin-bottom: 1rem;
        }
        input[type="url"] {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input[type="url"]:focus {
            border-color: #4a6cf7;
            box-shadow: 0 0 0 3px rgba(74, 108, 247, 0.1);
        }
        input[type="url"]:disabled {
            background: #f5f5f5;
            color: #999;
        }
        button {
            background: linear-gradient(135deg, #4a6cf7 0%, #6366f1 100%);
            color: white;
            border: none;
            padding: 14px 24px;
            font-size: 1rem;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 108, 247, 0.4);
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .log-container {
            margin-top: 1.5rem;
            background: #1a1a2e;
            border-radius: 10px;
            padding: 1rem;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }
        .log-container.active {
            display: block;
        }
        .log-entry {
            color: #a0a0a0;
            font-family: 'SF Mono', 'Monaco', 'Consolas', monospace;
            font-size: 0.8rem;
            padding: 4px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            animation: fadeIn 0.3s ease;
        }
        .log-entry:last-child {
            border-bottom: none;
            color: #4ade80;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .success-message {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            padding: 1rem;
            border-radius: 10px;
            margin-top: 1rem;
            text-align: center;
            display: none;
            animation: slideUp 0.3s ease;
        }
        .success-message.active {
            display: block;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .success-message a {
            color: white;
            font-weight: 600;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌐 Website Downloader</h1>
        <p class="subtitle">Baixe uma réplica perfeita de qualquer site, incluindo JS renderizado</p>
        
        <div class="input-group">
            <input type="url" id="urlInput" placeholder="https://exemplo.com" required>
        </div>
        
        <button id="downloadBtn" onclick="startDownload()">
            <span id="btnText">Baixar Réplica</span>
            <div class="spinner" id="spinner" style="display: none;"></div>
        </button>
        
        <div class="log-container" id="logContainer"></div>
        
        <div class="success-message" id="successMessage">
            ✅ Download pronto! <a href="#" id="downloadLink">Clique aqui se não iniciou automaticamente</a>
        </div>
    </div>

    <script>
        let currentSessionId = null;
        let eventSource = null;

        function startDownload() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) {
                alert('Por favor, insira uma URL válida');
                return;
            }

            // Update UI
            setLoading(true);
            clearLogs();
            hideSuccess();

            // Start download
            fetch('/start-download', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: url })
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    addLog('❌ ' + data.error);
                    setLoading(false);
                    return;
                }
                
                currentSessionId = data.session_id;
                connectSSE(currentSessionId);
            })
            .catch(error => {
                addLog('❌ Erro de conexão: ' + error.message);
                setLoading(false);
            });
        }

        function connectSSE(sessionId) {
            eventSource = new EventSource('/stream/' + sessionId);

            eventSource.onmessage = function(event) {
                addLog(event.data);
            };

            eventSource.addEventListener('done', function(event) {
                eventSource.close();
                
                if (event.data === 'complete') {
                    // Trigger download
                    triggerDownload(sessionId);
                    showSuccess(sessionId);
                } else {
                    addLog('❌ Download falhou');
                }
                
                // Reset UI after a short delay
                setTimeout(resetUI, 2000);
            });

            eventSource.onerror = function() {
                eventSource.close();
                setLoading(false);
            };
        }

        function triggerDownload(sessionId) {
            const link = document.createElement('a');
            link.href = '/download-file/' + sessionId;
            link.click();
            
            // Update manual download link
            document.getElementById('downloadLink').href = '/download-file/' + sessionId;
        }

        function showSuccess(sessionId) {
            document.getElementById('successMessage').classList.add('active');
            document.getElementById('downloadLink').href = '/download-file/' + sessionId;
        }

        function hideSuccess() {
            document.getElementById('successMessage').classList.remove('active');
        }

        function setLoading(loading) {
            const btn = document.getElementById('downloadBtn');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('spinner');
            const input = document.getElementById('urlInput');
            const logContainer = document.getElementById('logContainer');

            btn.disabled = loading;
            input.disabled = loading;
            spinner.style.display = loading ? 'block' : 'none';
            btnText.textContent = loading ? 'Processando...' : 'Baixar Réplica';
            
            if (loading) {
                logContainer.classList.add('active');
            }
        }

        function resetUI() {
            setLoading(false);
            document.getElementById('urlInput').value = '';
            
            // Hide logs after delay
            setTimeout(() => {
                document.getElementById('logContainer').classList.remove('active');
                hideSuccess();
                clearLogs();
            }, 5000);
        }

        function addLog(message) {
            const container = document.getElementById('logContainer');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = message;
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
        }

        function clearLogs() {
            document.getElementById('logContainer').innerHTML = '';
        }

        // Handle Enter key
        document.getElementById('urlInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !document.getElementById('downloadBtn').disabled) {
                startDownload();
            }
        });
    </script>

    <!-- ── Browser observability logger ──────────────────────────────────
         Captures window errors, unhandled promise rejections, console.error,
         and slow fetches. Batches up to 10 entries and ships via sendBeacon
         to /api/client-errors so they land in the same structlog stream as
         backend errors. -->
    <script>
    (function () {
        var ENDPOINT = '/api/client-errors';
        var BATCH_MAX = 10;
        var FLUSH_MS = 5000;
        var SLOW_FETCH_MS = 5000;
        var queue = [];
        // Capture pristine references BEFORE any wrappers (avoids feedback loop:
        // if /api/client-errors is slow/4xx, the wrapped fetch would re-enqueue
        // each flush, growing the queue unboundedly).
        var _rawFetch = window.fetch ? window.fetch.bind(window) : null;
        var sessionId = (function () {
            try {
                var k = 'fe_session_id';
                var v = sessionStorage.getItem(k);
                if (!v) {
                    v = 's' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
                    sessionStorage.setItem(k, v);
                }
                return v;
            } catch (_) { return 'no-storage'; }
        })();

        function flush() {
            if (!queue.length) return;
            var payload = JSON.stringify({ entries: queue.splice(0) });
            var sent = false;
            try {
                if (navigator.sendBeacon) {
                    sent = navigator.sendBeacon(ENDPOINT, new Blob([payload], { type: 'application/json' }));
                }
            } catch (_) { /* fall through to fetch */ }
            if (!sent && _rawFetch) {
                try {
                    // Use pristine fetch — bypasses the wrapper so a slow/failing
                    // logger endpoint never feeds back into its own queue.
                    _rawFetch(ENDPOINT, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: payload,
                        keepalive: true,
                    }).catch(function () { /* swallow — best-effort */ });
                } catch (_) { /* swallow */ }
            }
        }

        function enqueue(level, event, fields) {
            try {
                queue.push(Object.assign({
                    level: level,
                    event: event,
                    ts: new Date().toISOString(),
                    url: location.href,
                    userAgent: navigator.userAgent,
                    sessionId: sessionId,
                }, fields || {}));
                if (queue.length >= BATCH_MAX) flush();
            } catch (_) { /* never throw from logger */ }
        }

        // 1) Uncaught errors
        window.addEventListener('error', function (e) {
            enqueue('error', 'window_error', {
                message: e && e.message,
                stack: e && e.error && e.error.stack,
                extra: e && e.filename ? (e.filename + ':' + e.lineno + ':' + e.colno) : null,
            });
        });

        // 2) Unhandled promise rejections
        window.addEventListener('unhandledrejection', function (e) {
            var r = e && e.reason;
            enqueue('error', 'unhandled_rejection', {
                message: r && (r.message || String(r)),
                stack: r && r.stack,
            });
        });

        // 3) console.error wrapper (preserves original behavior + captures stacks)
        var _err = console.error.bind(console);
        console.error = function () {
            try {
                var stack = null;
                var parts = Array.prototype.slice.call(arguments).map(function (a) {
                    if (a instanceof Error) {
                        if (!stack) stack = a.stack || null;
                        return a.message || String(a);
                    }
                    return typeof a === 'string' ? a : JSON.stringify(a);
                });
                enqueue('error', 'console_error', { message: parts.join(' '), stack: stack });
            } catch (_) { /* swallow */ }
            _err.apply(console, arguments);
        };

        // 4) Slow-fetch detector + non-OK responses
        // CRITICAL: skip our own logger endpoint to avoid feedback loops.
        if (_rawFetch) {
            window.fetch = function (input, init) {
                var url = (typeof input === 'string') ? input : (input && input.url) || '';
                if (url.indexOf(ENDPOINT) !== -1) {
                    return _rawFetch(input, init);  // pristine path — no instrumentation
                }
                var t0 = performance.now();
                return _rawFetch(input, init).then(function (resp) {
                    var dt = performance.now() - t0;
                    if (dt > SLOW_FETCH_MS) {
                        enqueue('warning', 'fetch_slow', { message: url, extra: 'duration_ms=' + Math.round(dt) });
                    }
                    if (!resp.ok) {
                        enqueue('warning', 'fetch_non_ok', { message: url, extra: 'status=' + resp.status });
                    }
                    return resp;
                }).catch(function (err) {
                    enqueue('error', 'fetch_failed', { message: url, stack: err && err.stack });
                    throw err;
                });
            };
        }

        // 5) EventSource (SSE) connection failures — relevant for /stream/<id>
        if (window.EventSource) {
            var _ES = window.EventSource;
            window.EventSource = function (url, cfg) {
                var es = new _ES(url, cfg);
                es.addEventListener('error', function () {
                    if (es.readyState === _ES.CLOSED) {
                        enqueue('warning', 'sse_closed', { message: String(url) });
                    }
                });
                return es;
            };
            window.EventSource.CONNECTING = _ES.CONNECTING;
            window.EventSource.OPEN = _ES.OPEN;
            window.EventSource.CLOSED = _ES.CLOSED;
        }

        // 6) Periodic flush + flush on page hide
        setInterval(flush, FLUSH_MS);
        window.addEventListener('pagehide', flush);
        window.addEventListener('visibilitychange', function () {
            if (document.visibilityState === 'hidden') flush();
        });
    })();
    </script>
</body>
</html>
