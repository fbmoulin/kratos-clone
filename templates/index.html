<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kratos Clone — Website Downloader</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 520px;
        }
        h1 {
            margin: 0 0 0.5rem 0;
            font-size: 1.75rem;
            font-weight: 700;
            color: #1a1a2e;
        }
        .subtitle {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }
        .input-group {
            margin-bottom: 1rem;
        }
        input[type="url"] {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input[type="url"]:focus {
            border-color: #4a6cf7;
            box-shadow: 0 0 0 3px rgba(74, 108, 247, 0.1);
        }
        input[type="url"]:disabled {
            background: #f5f5f5;
            color: #999;
        }
        button {
            background: linear-gradient(135deg, #4a6cf7 0%, #6366f1 100%);
            color: white;
            border: none;
            padding: 14px 24px;
            font-size: 1rem;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 108, 247, 0.4);
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .log-container {
            margin-top: 1.5rem;
            background: #1a1a2e;
            border-radius: 10px;
            padding: 1rem;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }
        .log-container.active {
            display: block;
        }
        .log-entry {
            color: #a0a0a0;
            font-family: 'SF Mono', 'Monaco', 'Consolas', monospace;
            font-size: 0.8rem;
            padding: 4px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            animation: fadeIn 0.3s ease;
        }
        .log-entry:last-child {
            border-bottom: none;
            color: #4ade80;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .success-message {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            padding: 1rem;
            border-radius: 10px;
            margin-top: 1rem;
            text-align: center;
            display: none;
            animation: slideUp 0.3s ease;
        }
        .success-message.active {
            display: block;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .success-message a {
            color: white;
            font-weight: 600;
            text-decoration: underline;
        }
        .error-message {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
            padding: 0.75rem 1rem;
            border-radius: 10px;
            margin-top: 0.75rem;
            font-size: 0.9rem;
            display: none;
        }
        .error-message.active { display: block; }
        /* ============================================================
           KRATOS CLONE — Rebrand v1.0 (2026-05-16)
           Dark + vivid orange radial + Bricolage Grotesque display.
           Tokens at :root cascade everywhere; theming overrides win via
           source order over the legacy light-card styles above.
           ============================================================ */
        :root {
            --ink-base: #0a0a14; --ink-elevated: #111120; --ink-overlay: #1a1a2e; --ink-border: #2a2a42;
            --orange-core: #ff6b35; --orange-bright: #ff8c5a; --orange-deep: #cc4f1f;
            --orange-glow: rgba(255,107,53,0.22); --orange-glow-soft: rgba(255,107,53,0.10); --orange-border: rgba(255,107,53,0.30);
            --text-primary: #f0eee8; --text-secondary: #a89f93; --text-muted: #6b6460;
            --color-success: #3ecf8e; --color-error: #f87171; --color-warning: #f5a623;
            --shadow-ambient: 0 2px 8px rgba(0,0,0,0.45); --shadow-key: 0 8px 24px rgba(0,0,0,0.55); --shadow-glow: 0 0 28px rgba(255,107,53,0.18);
            --radius-md: 8px; --radius-lg: 12px; --radius-xl: 16px; --radius-pill: 999px;
            --duration-fast: 150ms; --duration-base: 200ms; --duration-slow: 400ms;
            --ease-out: cubic-bezier(0.16, 1, 0.3, 1); --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        body {
            background:
                radial-gradient(circle at 30% 10%, rgba(255,107,53,0.18), transparent 55%),
                radial-gradient(circle at 85% 90%, rgba(255,107,53,0.10), transparent 50%),
                var(--ink-base);
            background-attachment: fixed;
            color: var(--text-primary);
            align-items: flex-start;
            padding-top: 60px;
        }
        .container {
            background: var(--ink-elevated); border: 1px solid var(--ink-border); color: var(--text-primary);
            box-shadow: var(--shadow-ambient), var(--shadow-key);
        }
        h1 { color: var(--text-primary); font-family: "Bricolage Grotesque", system-ui, sans-serif; letter-spacing: -0.02em; }
        .subtitle { color: var(--text-secondary); }
        input[type="url"], input[type="text"] {
            background: var(--ink-overlay); border: 1px solid var(--ink-border); color: var(--text-primary);
        }
        input[type="url"]:focus { border-color: var(--orange-core); box-shadow: 0 0 0 3px var(--orange-glow); }
        input[type="url"]:disabled { background: #1a1a2e; color: var(--text-muted); }
        #downloadBtn {
            background: linear-gradient(135deg, var(--orange-core) 0%, var(--orange-bright) 100%);
            font-family: "Bricolage Grotesque", system-ui, sans-serif; font-weight: 600;
        }
        #downloadBtn:hover:not(:disabled) {
            background: linear-gradient(135deg, var(--orange-bright) 0%, var(--orange-core) 100%);
            box-shadow: 0 6px 20px rgba(255,107,53,0.4);
        }
        #downloadBtn:disabled { background: var(--ink-border); color: var(--text-muted); }
        button:focus-visible, input:focus-visible, a:focus-visible {
            outline: 3px solid var(--orange-core); outline-offset: 2px;
        }
        .error-message {
            background: rgba(248,113,113,0.08); color: var(--color-error); border: 1px solid rgba(248,113,113,0.25);
        }
        .log-container { background: var(--ink-overlay); border: 1px solid var(--ink-border); }
        .log-entry { color: var(--text-secondary); border-bottom-color: rgba(255,255,255,0.04); }
        .log-entry:last-child { color: var(--color-success); }
        .success-message { box-shadow: var(--shadow-ambient), 0 0 24px rgba(62,207,142,0.25); }

        /* --- Brand wordmark --- */
        .brand-header {
            text-align: center; padding: 0 0 1.5rem; margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--ink-border);
        }
        .brand-wordmark__logo {
            font-family: "Bricolage Grotesque", system-ui, sans-serif;
            font-weight: 700; font-size: clamp(1.625rem, 4vw, 2.25rem); line-height: 1;
            letter-spacing: -0.03em; display: inline-block;
        }
        .brand-wordmark__kratos { color: var(--text-primary); }
        .brand-wordmark__clone { color: var(--orange-core); text-shadow: 0 0 24px rgba(255,107,53,0.45); }
        .brand-wordmark__descriptor {
            display: block; font-family: system-ui, sans-serif; font-weight: 500;
            font-size: 0.65rem; letter-spacing: 0.22em; text-transform: uppercase;
            color: var(--text-secondary); margin-top: 0.5rem; padding-top: 0.5rem;
        }

        /* --- Highlight box --- */
        .highlight-box {
            position: relative; margin-top: 2rem; padding: 1.75rem;
            background: var(--ink-overlay); border: 1px solid var(--orange-border);
            border-radius: var(--radius-xl); box-shadow: var(--shadow-ambient);
            overflow: hidden;
            transition: box-shadow var(--duration-base) var(--ease-out),
                        transform var(--duration-base) var(--ease-out),
                        border-color var(--duration-base) var(--ease-out);
        }
        .highlight-box::before {
            content: ""; position: absolute; inset: 0;
            background: radial-gradient(circle at 85% 15%, rgba(255,107,53,0.10), transparent 65%);
            pointer-events: none;
        }
        .highlight-box:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-ambient), var(--shadow-key), var(--shadow-glow);
            border-color: rgba(255,107,53,0.55);
        }
        .highlight-box > * { position: relative; }
        .highlight-box__chip {
            display: inline-block; background: rgba(255,107,53,0.15); color: var(--orange-bright);
            border: 1px solid var(--orange-border); border-radius: var(--radius-pill);
            font-size: 0.65rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
            padding: 0.25rem 0.75rem; margin-bottom: 1rem;
        }
        .highlight-box__headline {
            font-family: "Bricolage Grotesque", system-ui, sans-serif;
            font-weight: 700; font-size: 1.375rem; line-height: 1.2; letter-spacing: -0.02em;
            color: var(--text-primary); margin: 0 0 0.75rem;
        }
        .highlight-box__desc {
            font-size: 0.9rem; color: var(--text-secondary); line-height: 1.65;
            margin: 0 0 1.25rem; max-width: 44ch;
        }
        .highlight-box__cta {
            display: inline-flex; align-items: center; gap: 0.5rem;
            background: linear-gradient(135deg, var(--orange-core) 0%, var(--orange-bright) 100%);
            color: white !important; font-family: "Bricolage Grotesque", system-ui, sans-serif;
            font-weight: 600; padding: 0.75rem 1.5rem; border-radius: var(--radius-md);
            text-decoration: none;
            transition: transform var(--duration-fast) var(--ease-out),
                        box-shadow var(--duration-fast) var(--ease-out);
        }
        .highlight-box__cta:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(255,107,53,0.4); }

        /* --- Motion (page-load stagger + CTA pulse) --- */
        @keyframes kc-fade-up { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes kc-pulse-cta { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.015); } }
        .js-stagger { opacity: 0; animation: kc-fade-up var(--duration-slow) var(--ease-out) both; animation-delay: var(--delay, 0ms); }
        .js-stagger--0 { --delay: 0ms; } .js-stagger--1 { --delay: 80ms; }
        .js-stagger--2 { --delay: 160ms; } .js-stagger--3 { --delay: 240ms; }
        .js-stagger--4 { --delay: 320ms; }
        .js-pulse { animation: kc-pulse-cta 2.4s var(--ease-out) infinite; }
        .js-pulse:hover { animation-play-state: paused; }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
        /* ═══════════════════════════════════════════════════════════
           REFINEMENT v2 (2026-05-16) — aurora atmosphere, glassmorphism,
           integrated CTA, polished motion. Modern UI/UX 2026 patterns.
           ═══════════════════════════════════════════════════════════ */
        /* Aurora atmospheric background — 3 animated blobs, mix-blend screen */
        .aurora-stage { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
        .aurora-blob { position: absolute; border-radius: 50%; filter: blur(80px);
            mix-blend-mode: screen; opacity: 0; will-change: transform; }
        .aurora-blob:nth-child(1) { width: 72vw; height: 72vw; max-width: 900px; max-height: 900px;
            top: -20%; left: -15%;
            background: radial-gradient(ellipse, rgba(255,107,53,0.14) 0%, transparent 70%);
            animation: aurora-fade-in 2s var(--ease-out) 0.4s forwards,
                       aurora-drift-a 50s ease-in-out 0.4s infinite alternate; }
        .aurora-blob:nth-child(2) { width: 56vw; height: 56vw; max-width: 720px; max-height: 720px;
            top: 30%; right: -10%;
            background: radial-gradient(ellipse, rgba(139,92,246,0.09) 0%, transparent 70%);
            animation: aurora-fade-in 2s var(--ease-out) 0.8s forwards,
                       aurora-drift-b 40s ease-in-out 0.8s infinite alternate; }
        .aurora-blob:nth-child(3) { width: 44vw; height: 44vw; max-width: 560px; max-height: 560px;
            bottom: -15%; left: 30%;
            background: radial-gradient(ellipse, rgba(255,107,53,0.08) 0%, transparent 70%);
            animation: aurora-fade-in 2s var(--ease-out) 1.2s forwards,
                       aurora-drift-c 55s ease-in-out 1.2s infinite alternate; }
        @keyframes aurora-fade-in { from { opacity: 0; } to { opacity: 1; } }
        @keyframes aurora-drift-a { from { transform: translate(0, 0) scale(1); } to { transform: translate(60px, 40px) scale(1.08); } }
        @keyframes aurora-drift-b { from { transform: translate(0, 0) scale(1); } to { transform: translate(-50px, 60px) scale(0.95); } }
        @keyframes aurora-drift-c { from { transform: translate(0, 0) scale(1); } to { transform: translate(40px, -30px) scale(1.05); } }

        /* Page shell — lifts content above aurora */
        .page-shell { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; }
        .page-main { flex: 1; display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 3rem 1.25rem 4rem; gap: 0; width: 100%; }
        body { padding-top: 0; align-items: stretch; }

        /* Hero — wordmark + tagline as single integrated narrative */
        .hero { display: flex; flex-direction: column; align-items: center; text-align: center;
            margin-bottom: 2rem; gap: 0.5rem; }
        .hero-eyebrow { font-size: 0.6875rem; font-weight: 600; letter-spacing: 0.16em;
            text-transform: uppercase; color: rgba(255,107,53,0.78); margin: 0; }
        .hero-wordmark { font-family: "Bricolage Grotesque", system-ui, sans-serif;
            font-size: clamp(2.25rem, 5vw, 3.5rem); font-weight: 700; letter-spacing: -0.03em;
            line-height: 1; margin: 0; color: var(--text-primary); }
        .wordmark-kratos { color: var(--text-primary); }
        .wordmark-clone { color: var(--orange-core); text-shadow: 0 0 32px rgba(255,107,53,0.40); }
        .hero-tagline { font-size: clamp(0.875rem, 1.5vw, 1rem); color: var(--text-secondary);
            margin: 0.25rem 0 0; font-weight: 400; max-width: 42ch; }

        /* Glassmorphism — frosted surface that lets aurora bleed through */
        .glass {
            background: rgba(11, 11, 22, 0.55) !important;
            backdrop-filter: blur(24px) saturate(150%);
            -webkit-backdrop-filter: blur(24px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.06) !important;
            box-shadow:
                inset 0 1px 0 0 rgba(255, 255, 255, 0.04),
                0 24px 48px rgba(0, 0, 0, 0.45),
                0 4px 16px rgba(0, 0, 0, 0.25);
        }

        /* Container override — wider + glass */
        .container { max-width: 680px; border-radius: var(--radius-xl); padding: 2rem 2rem 1.75rem; }
        @media (min-width: 1280px) { .container { max-width: 720px; } }
        @media (max-width: 720px) { .container { max-width: 100%; border-radius: var(--radius-lg); padding: 1.5rem; } .page-main { padding: 2rem 1rem 3rem; } }

        /* Refined reveal grammar — longer + smoother than original stagger */
        @keyframes reveal-up { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .reveal { opacity: 0; animation: reveal-up 700ms var(--ease-out) forwards; }
        .reveal-d1 { animation-delay: 100ms; }
        .reveal-d2 { animation-delay: 220ms; }
        .reveal-d3 { animation-delay: 340ms; }
        .reveal-d4 { animation-delay: 460ms; }

        /* Integrated secondary CTA — replaces highlight box; reads as page footer link */
        .secondary-cta { display: flex; align-items: center; gap: 0.625rem; margin-top: 1.5rem;
            padding-top: 1.25rem; border-top: 1px solid rgba(255,255,255,0.07); justify-content: center; }
        .secondary-cta__badge { font-size: 0.625rem; font-weight: 700; letter-spacing: 0.10em;
            color: var(--orange-core); background: rgba(255,107,53,0.12);
            border: 1px solid rgba(255,107,53,0.25); border-radius: 4px;
            padding: 2px 6px; line-height: 1.4; flex-shrink: 0; text-transform: uppercase; }
        .secondary-cta__link { font-size: 0.8125rem; color: var(--text-secondary); text-decoration: none;
            display: inline-flex; align-items: center; gap: 0.375rem;
            transition: color var(--duration-base) var(--ease-out); }
        .secondary-cta__link:hover { color: var(--text-primary); }
        .secondary-cta__link:focus-visible { outline: 2px solid var(--orange-core); outline-offset: 3px; border-radius: 2px; }
        .secondary-cta__arrow { display: inline-block; transition: transform var(--duration-base) var(--ease-out); }
        .secondary-cta__link:hover .secondary-cta__arrow { transform: translateX(3px); }

        /* Button shimmer pass on hover — modern micro-interaction */
        #downloadBtn { position: relative; overflow: hidden; isolation: isolate;
            transition: transform var(--duration-base) var(--ease-out), box-shadow var(--duration-base) var(--ease-out); }
        #downloadBtn::after { content: ""; position: absolute; inset: 0;
            background: linear-gradient(105deg, transparent 30%, rgba(255,255,255,0.14) 50%, transparent 70%);
            background-size: 200% 100%; background-position-x: -100%;
            transform: skewX(-8deg); pointer-events: none;
            transition: background-position-x 600ms var(--ease-out); }
        #downloadBtn:hover:not(:disabled)::after { background-position-x: 200%; }
        #downloadBtn:hover:not(:disabled) { transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(255,107,53,0.35), 0 4px 12px rgba(255,107,53,0.20); }
        #downloadBtn:active { transform: translateY(0); transition-duration: 80ms; }

        /* Input focus ring (orange glow halo, transitionable) */
        input[type="url"]:focus, input[type="text"]:focus, textarea:focus {
            outline: none; border-color: rgba(255,107,53,0.55);
            box-shadow: 0 0 0 3px rgba(255,107,53,0.15), 0 0 0 1px rgba(255,107,53,0.40);
            background-color: rgba(255,255,255,0.03);
        }
        input[type="url"], input[type="text"], textarea {
            transition: box-shadow 250ms var(--ease-out), border-color 250ms var(--ease-out), background-color 200ms ease;
        }

        /* Reduced motion — zero all new effects too */
        @media (prefers-reduced-motion: reduce) {
            .aurora-blob { animation: none !important; opacity: 0.45 !important; }
            .reveal { animation: none !important; opacity: 1 !important; transform: none !important; }
            .secondary-cta__arrow { transition: none; }
            #downloadBtn::after { display: none; }
            #downloadBtn:hover:not(:disabled) { transform: none; }
            input[type="url"], input[type="text"], textarea { transition: none; }
        }
        /* Visually hidden but available to assistive tech (WCAG label pattern) */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
        /* Stronger contrast on subtitle to clear WCAG AA (P2 follow-up) */
        .subtitle { color: #4a4a4a; }
        /* Style focus outline so keyboard users see where focus lands */
        button:focus-visible, input:focus-visible, a:focus-visible {
            outline: 3px solid #4a6cf7;
            outline-offset: 2px;
        }
    </style>
</head>
<body>
    <div class="aurora-stage" aria-hidden="true">
        <div class="aurora-blob"></div>
        <div class="aurora-blob"></div>
        <div class="aurora-blob"></div>
    </div>

    <div class="page-shell">
    <main class="page-main">
        <header class="hero" role="banner">
            <p class="hero-eyebrow reveal reveal-d1">Ferramentas</p>
            <h1 class="hero-wordmark reveal reveal-d2" aria-label="Kratos Clone">
                <span class="wordmark-kratos">KRATOS</span><span class="wordmark-clone"> CLONE</span>
            </h1>
            <p class="hero-tagline reveal reveal-d3">Capture qualquer site em segundos — JS renderizado incluído.</p>
        </header>
        <section class="container glass reveal reveal-d4" aria-busy="false" id="mainCard" aria-label="Formulário de captura de site">

        <form id="downloadForm" novalidate>
            <div class="input-group">
                <label for="urlInput" class="sr-only">URL do site para baixar</label>
                <input
                    type="url"
                    id="urlInput"
                    name="url"
                    placeholder="https://exemplo.com"
                    required
                    autocomplete="url"
                    aria-describedby="errorMessage"
                    aria-invalid="false"
                >
            </div>

            <div class="error-message" id="errorMessage" role="alert" aria-live="assertive"></div>

            <button id="downloadBtn" type="submit" class="js-pulse">
                <span id="btnText">Baixar Réplica</span>
                <div class="spinner" id="spinner" style="display: none;" aria-hidden="true"></div>
            </button>
        </form>

        <div
            class="log-container"
            id="logContainer"
            role="log"
            aria-live="polite"
            aria-label="Log de progresso do download"
        ></div>

        <div
            class="success-message"
            id="successMessage"
            role="status"
            aria-live="polite"
        >
            ✅ Download pronto! <a href="#" id="downloadLink">Clique aqui se não iniciou automaticamente</a>
        </div>

        <div class="secondary-cta" id="personalize-cta">
            <span class="secondary-cta__badge">BETA</span>
            <a href="/personalize" class="secondary-cta__link" aria-label="Personalize um capture existente com a sua marca via IA">
                Personalize com a sua marca
                <span class="secondary-cta__arrow" aria-hidden="true">→</span>
            </a>
        </div>
        </section>
    </main>
    </div>

    <script>
        let currentSessionId = null;
        let eventSource = null;
        // U1: wall-clock elapsed-time feedback during the worker thread.
        // Operator sees `Processando — 23s` so a long-running capture doesn't look stuck.
        let elapsedTimer = null;
        let elapsedSeconds = 0;

        const $ = (id) => document.getElementById(id);

        // U7: PT-BR error catalog — declarative, peer-to-peer, no apology theater.
        // Duplicated in personalize.html (single-script-per-template constraint).
        var ERROR_MESSAGES = {
            network: { message: "Sem resposta do servidor.", action: "Verifique sua conexão e tente novamente." },
            by_status: {
                400: { message: "Requisição inválida.", action: "Revise os campos e tente novamente." },
                413: { message: "Payload excede o limite permitido.", action: "Reduza o tamanho do arquivo e reenvie." },
                415: { message: "Formato de envio não suportado.", action: "Confirme que a requisição usa multipart/form-data." },
                429: { message: "Limite de requisições atingido.", action: "Aguarde antes de tentar novamente." },
                500: { message: "Erro interno no servidor.", action: "Tente novamente em alguns segundos." }
            },
            by_context: {
                '/start-download': {
                    400: { message: "URL ausente ou inválida.", action: "Informe uma URL completa e tente novamente." }
                }
            },
            fallback: { message: "Erro inesperado.", action: "Recarregue a página e tente novamente." }
        };

        function resolveError(opts) {
            if (opts.networkError) {
                var n = ERROR_MESSAGES.network;
                return n.message + ' ' + n.action;
            }
            var ctxMap = ERROR_MESSAGES.by_context[opts.endpoint || ''] || {};
            var entry = (opts.status && ctxMap[opts.status])
                || (opts.status && ERROR_MESSAGES.by_status[opts.status])
                || ERROR_MESSAGES.fallback;
            if (opts.backendError) return opts.backendError + ' ' + entry.action;
            return entry.message + ' ' + entry.action;
        }

        // U8: persist last URL across page loads so re-running a variant doesn't need re-typing.
        // localStorage can throw in private mode → always wrap in try/catch.
        var LAST_URL_KEY = 'kratos_clone_last_url';
        function loadLastUrl() {
            try {
                var v = localStorage.getItem(LAST_URL_KEY);
                if (v) $('urlInput').value = v;
            } catch (_) { /* private mode or storage disabled — non-fatal */ }
        }
        function saveLastUrl(url) {
            try { localStorage.setItem(LAST_URL_KEY, url); } catch (_) { /* ignore */ }
        }

        // U9: client-side URL validation — short-circuit obviously malformed inputs.
        // Native browser validation is disabled (form has novalidate) so we render in our
        // own #errorMessage region with role=alert.
        function isValidUrl(value) {
            if (!value) return false;
            try {
                var u = new URL(value);
                return u.protocol === 'http:' || u.protocol === 'https:';
            } catch (_) { return false; }
        }

        function showError(message) {
            const el = $('errorMessage');
            el.textContent = message;
            el.classList.add('active');
            $('urlInput').setAttribute('aria-invalid', 'true');
            // Move focus to input so screen readers + keyboard users find the error
            $('urlInput').focus();
        }

        function clearError() {
            const el = $('errorMessage');
            el.textContent = '';
            el.classList.remove('active');
            $('urlInput').setAttribute('aria-invalid', 'false');
        }

        function startDownload() {
            const url = $('urlInput').value.trim();
            // U9: client-side validation — show error inline before network roundtrip
            if (!isValidUrl(url)) {
                showError(resolveError({ status: 400, endpoint: '/start-download' }));
                return;
            }

            clearError();
            setLoading(true);
            clearLogs();
            hideSuccess();
            // U8: persist the URL so re-running variants is one-click
            saveLastUrl(url);

            fetch('/start-download', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: url })
            })
            .then(response => response.json().then(data => ({ status: response.status, data: data })))
            .then(res => {
                if (res.status !== 200 || (res.data && res.data.error)) {
                    var msg = resolveError({
                        status: res.status,
                        endpoint: '/start-download',
                        backendError: res.data && res.data.error
                    });
                    addLog('❌ ' + msg);
                    showError(msg);
                    setLoading(false);
                    return;
                }

                currentSessionId = res.data.session_id;
                connectSSE(currentSessionId);
            })
            .catch(error => {
                var msg = resolveError({ networkError: true });
                addLog('❌ ' + msg);
                showError(msg);
                setLoading(false);
            });
        }

        function connectSSE(sessionId) {
            eventSource = new EventSource('/stream/' + sessionId);

            eventSource.onmessage = function(event) {
                addLog(event.data);
            };

            eventSource.addEventListener('done', function(event) {
                eventSource.close();

                if (event.data === 'complete') {
                    triggerDownload(sessionId);
                    showSuccess(sessionId);
                } else {
                    addLog('❌ Download falhou');
                    // SSE-side failure: backend already streamed details to log; just point operator there
                    showError('Falha no download. Veja o log acima para detalhes.');
                }

                setTimeout(resetUI, 2000);
            });

            eventSource.onerror = function() {
                eventSource.close();
                setLoading(false);
            };
        }

        function triggerDownload(sessionId) {
            const link = document.createElement('a');
            link.href = '/download-file/' + sessionId;
            link.click();
            $('downloadLink').href = '/download-file/' + sessionId;
        }

        function showSuccess(sessionId) {
            $('successMessage').classList.add('active');
            $('downloadLink').href = '/download-file/' + sessionId;
            // Move focus to the manual-download link so keyboard users land on the next action
            $('downloadLink').focus();
        }

        function hideSuccess() {
            $('successMessage').classList.remove('active');
        }

        function setLoading(loading) {
            const btn = $('downloadBtn');
            const btnText = $('btnText');
            const spinner = $('spinner');
            const input = $('urlInput');
            const logContainer = $('logContainer');
            const card = $('mainCard');

            btn.disabled = loading;
            input.disabled = loading;
            spinner.style.display = loading ? 'block' : 'none';
            card.setAttribute('aria-busy', loading ? 'true' : 'false');

            if (loading) {
                logContainer.classList.add('active');
                // Start the elapsed-time ticker (U1). 1s resolution — below feels
                // jittery, above feels laggy. Reset to 0 on each new run.
                elapsedSeconds = 0;
                btnText.textContent = 'Processando — 0s';
                if (elapsedTimer) clearInterval(elapsedTimer);
                elapsedTimer = setInterval(() => {
                    elapsedSeconds += 1;
                    btnText.textContent = 'Processando — ' + elapsedSeconds + 's';
                }, 1000);
            } else {
                if (elapsedTimer) {
                    clearInterval(elapsedTimer);
                    elapsedTimer = null;
                }
                btnText.textContent = 'Baixar Réplica';
            }
        }

        function resetUI() {
            setLoading(false);
            // Keep the URL — re-running for a variant is a common pattern (was: auto-clear).
            // Only hide success/logs; don't wipe the input or empty the log on error so the
            // user can copy log lines / inspect failures.
            const isError = $('errorMessage').classList.contains('active');
            if (!isError) {
                setTimeout(() => {
                    $('logContainer').classList.remove('active');
                    hideSuccess();
                    clearLogs();
                }, 5000);
            }
        }

        function addLog(message) {
            const container = $('logContainer');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = message;
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
        }

        function clearLogs() {
            $('logContainer').innerHTML = '';
        }

        // Native form submit — handles Enter key for free and is what assistive tech expects
        $('downloadForm').addEventListener('submit', function (e) {
            e.preventDefault();
            if (!$('downloadBtn').disabled) startDownload();
        });

        // U8: restore last URL on page load so operator can re-run without retyping
        loadLastUrl();
    </script>

    <!-- ── Browser observability logger ──────────────────────────────────
         Captures window errors, unhandled promise rejections, console.error,
         and slow fetches. Batches up to 10 entries and ships via sendBeacon
         to /api/client-errors so they land in the same structlog stream as
         backend errors. -->
    <script>
    (function () {
        var ENDPOINT = '/api/client-errors';
        var BATCH_MAX = 10;
        var FLUSH_MS = 5000;
        var SLOW_FETCH_MS = 5000;
        var queue = [];
        // Capture pristine references BEFORE any wrappers (avoids feedback loop:
        // if /api/client-errors is slow/4xx, the wrapped fetch would re-enqueue
        // each flush, growing the queue unboundedly).
        var _rawFetch = window.fetch ? window.fetch.bind(window) : null;
        var sessionId = (function () {
            try {
                var k = 'fe_session_id';
                var v = sessionStorage.getItem(k);
                if (!v) {
                    v = 's' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
                    sessionStorage.setItem(k, v);
                }
                return v;
            } catch (_) { return 'no-storage'; }
        })();

        function flush() {
            if (!queue.length) return;
            var payload = JSON.stringify({ entries: queue.splice(0) });
            var sent = false;
            try {
                if (navigator.sendBeacon) {
                    sent = navigator.sendBeacon(ENDPOINT, new Blob([payload], { type: 'application/json' }));
                }
            } catch (_) { /* fall through to fetch */ }
            if (!sent && _rawFetch) {
                try {
                    // Use pristine fetch — bypasses the wrapper so a slow/failing
                    // logger endpoint never feeds back into its own queue.
                    _rawFetch(ENDPOINT, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: payload,
                        keepalive: true,
                    }).catch(function () { /* swallow — best-effort */ });
                } catch (_) { /* swallow */ }
            }
        }

        // Hard cap on queue size — protects against unbounded memory growth
        // when flush() never runs (e.g., extension blocks setInterval) or when
        // the page generates errors faster than they can be shipped (L3 audit).
        var QUEUE_HARD_MAX = 200;

        // P1-I client-side fix: strip query + fragment BEFORE the URL traverses
        // the network. Server-side _strip_query also exists as defense-in-depth
        // but does not close the transport-layer leak (proxy/gunicorn access logs
        // see the raw URL on the way in). Adversarial review caught this gap.
        var _safeUrl = function () {
            try { return location.origin + location.pathname; }
            catch (_) { return ''; }
        };

        function enqueue(level, event, fields) {
            try {
                if (queue.length >= QUEUE_HARD_MAX) {
                    queue.shift(); // drop oldest, keep newest
                }
                queue.push(Object.assign({
                    level: level,
                    event: event,
                    ts: new Date().toISOString(),
                    url: _safeUrl(),
                    userAgent: navigator.userAgent,
                    sessionId: sessionId,
                }, fields || {}));
                if (queue.length >= BATCH_MAX) flush();
            } catch (_) { /* never throw from logger */ }
        }

        // 1) Uncaught errors
        window.addEventListener('error', function (e) {
            enqueue('error', 'window_error', {
                message: e && e.message,
                stack: e && e.error && e.error.stack,
                extra: e && e.filename ? (e.filename + ':' + e.lineno + ':' + e.colno) : null,
            });
        });

        // 2) Unhandled promise rejections
        window.addEventListener('unhandledrejection', function (e) {
            var r = e && e.reason;
            enqueue('error', 'unhandled_rejection', {
                message: r && (r.message || String(r)),
                stack: r && r.stack,
            });
        });

        // 3) console.error wrapper (preserves original behavior + captures stacks)
        var _err = console.error.bind(console);
        console.error = function () {
            try {
                var stack = null;
                var parts = Array.prototype.slice.call(arguments).map(function (a) {
                    if (a instanceof Error) {
                        if (!stack) stack = a.stack || null;
                        return a.message || String(a);
                    }
                    return typeof a === 'string' ? a : JSON.stringify(a);
                });
                enqueue('error', 'console_error', { message: parts.join(' '), stack: stack });
            } catch (_) { /* swallow */ }
            _err.apply(console, arguments);
        };

        // 4) Slow-fetch detector + non-OK responses
        // CRITICAL: skip our own logger endpoint to avoid feedback loops.
        if (_rawFetch) {
            window.fetch = function (input, init) {
                var url = (typeof input === 'string') ? input : (input && input.url) || '';
                if (url.indexOf(ENDPOINT) !== -1) {
                    return _rawFetch(input, init);  // pristine path — no instrumentation
                }
                var t0 = performance.now();
                return _rawFetch(input, init).then(function (resp) {
                    var dt = performance.now() - t0;
                    if (dt > SLOW_FETCH_MS) {
                        enqueue('warning', 'fetch_slow', { message: url, extra: 'duration_ms=' + Math.round(dt) });
                    }
                    if (!resp.ok) {
                        enqueue('warning', 'fetch_non_ok', { message: url, extra: 'status=' + resp.status });
                    }
                    return resp;
                }).catch(function (err) {
                    enqueue('error', 'fetch_failed', { message: url, stack: err && err.stack });
                    throw err;
                });
            };
        }

        // 5) EventSource (SSE) connection failures — relevant for /stream/<id>
        if (window.EventSource) {
            var _ES = window.EventSource;
            window.EventSource = function (url, cfg) {
                var es = new _ES(url, cfg);
                es.addEventListener('error', function () {
                    if (es.readyState === _ES.CLOSED) {
                        enqueue('warning', 'sse_closed', { message: String(url) });
                    }
                });
                return es;
            };
            window.EventSource.CONNECTING = _ES.CONNECTING;
            window.EventSource.OPEN = _ES.OPEN;
            window.EventSource.CLOSED = _ES.CLOSED;
        }

        // 6) Periodic flush + flush on page hide
        setInterval(flush, FLUSH_MS);
        window.addEventListener('pagehide', flush);
        window.addEventListener('visibilitychange', function () {
            if (document.visibilityState === 'hidden') flush();
        });
    })();
    </script>
